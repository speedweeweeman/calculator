<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="styles.css">
    <script defer src="script.js"></script>
</head>
<body>
    <div class="mainBody">
        <div class="typedPanel">blahblah</div>
        <div class="inputPanel">
            <div class="row row1">
                <button class="1">1</button>
                <button class="2">2</button>
                <button class="3">3</button>
                <button class="+">+</button>
            </div>
            <div class="row row2">
                <button class="4">4</button>
                <button class="5">5</button>
                <button class="6">6</button>
                <button class="-">-</button>
            </div>
            <div class="row row3">
                <button class="7">7</button>
                <button class="8">8</button>
                <button class="9">9</button>
                <button class="x">x</button>
            </div>
            <div class="row row4">
                <button class="=">=</button>
                <button class="0">0</button>
                <button class="clear">clear</button>
                <button class="/">/</button>
            </div>
        </div>
    </div>
</body>
</html>
